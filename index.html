<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>BNEO Cabinet</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="hero-card">
      <div>
        <div class="eyebrow">BNEO</div>
        <h1>Рабочий кабинет</h1>
        <p>Шаблоны, быстрые команды и отправка прямо в бота.</p>
      </div>
      <div class="pill">Mini App</div>
    </header>

    <section class="grid">
      <button class="feature-card" type="button" data-action="court-template">
        <span class="icon">⚖️</span>
        <span class="title">Шаблон суда</span>
        <span class="desc">Заполнить черновик формой суда</span>
      </button>
      <button class="feature-card" type="button" data-action="outing-template">
        <span class="icon">🚗</span>
        <span class="title">Шаблон выезда</span>
        <span class="desc">Заполнить черновик формой выезда</span>
      </button>
      <button class="feature-card" type="button" data-action="today">
        <span class="icon">📆</span>
        <span class="title">На сегодня</span>
        <span class="desc">Отправить команду /today</span>
      </button>
      <button class="feature-card" type="button" data-action="week">
        <span class="icon">🗓️</span>
        <span class="title">На неделю</span>
        <span class="desc">Отправить команду /week</span>
      </button>
    </section>

    <section class="form-card">
      <label for="payload">Черновик сообщения</label>
      <textarea id="payload" rows="8" placeholder="Сюда можно собрать текст, который Mini App отправит боту"></textarea>
      <div id="htmlActions" class="actions">
        <button id="copyBtn" class="secondary" type="button">Скопировать</button>
        <button id="sendBtn" class="primary" type="button">Отправить в бота</button>
      </div>
      <div id="status" class="status" aria-live="polite"></div>
      <p class="hint">Кнопки отправки доступны и внутри Telegram, и в обычном браузере.</p>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
