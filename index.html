<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>BNEO GROUP</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="hero-card">
      <div class="brand-block">
        <img class="brand-logo" src="assets/logo.png" alt="BNEO" />
        <div>
          <div class="eyebrow">BNEO</div>
          <h1>Рабочий кабинет</h1>
          <p>Суды, выезды и быстрые команды в одном окне.</p>
        </div>
      </div>
      <div class="pill">BNEO GROUP</div>
    </header>

    <section class="quick-grid">
      <button class="quick-card" type="button" data-action="today">
        <span class="icon">📆</span>
        <span class="title">На сегодня</span>
        <span class="desc">Отправить в бота /today</span>
      </button>
      <button class="quick-card" type="button" data-action="week">
        <span class="icon">🗓️</span>
        <span class="title">На неделю</span>
        <span class="desc">Отправить в бота /week</span>
      </button>
      <button class="quick-card" type="button" data-action="court-template">
        <span class="icon">⚖️</span>
        <span class="title">Шаблон суда</span>
        <span class="desc">Заполнить поля для суда</span>
      </button>
      <button class="quick-card" type="button" data-action="outing-template">
        <span class="icon">🚗</span>
        <span class="title">Шаблон выезда</span>
        <span class="desc">Заполнить поля для выезда</span>
      </button>
    </section>

    <section class="panel-card">
      <div class="tabs">
        <button class="tab-btn is-active" type="button" data-tab="court">Суд</button>
        <button class="tab-btn" type="button" data-tab="outing">Выезд</button>
      </div>

      <div class="tab-panel is-active" data-panel="court">
        <div class="field-grid">
          <label><span>Дата</span><input id="courtDate" type="date" /></label>
          <label><span>Время</span><input id="courtTime" type="time" /></label>
          <label><span>Номер дела</span><input id="courtCase" type="text" placeholder="A21-025/2026" /></label>
          <label><span>Номер экспертизы</span><input id="courtExpertise" type="text" placeholder="0734К-2026" /></label>
          <label class="full"><span>Название суда</span><input id="courtName" type="text" placeholder="Московский районный суд" /></label>
          <label class="full"><span>Адрес</span><input id="courtAddress" type="text" placeholder="г. Калининград, ул. Примерная, д. 1" /></label>
          <label class="full"><span>Участник</span><input id="courtPerson" type="text" placeholder="Иванов Иван" /></label>
          <label class="full"><span>Комментарий / событие</span><input id="courtTitle" type="text" placeholder="суд по делу" /></label>
        </div>
        <div class="form-actions">
          <button type="button" class="ghost-btn" data-action="court-template">Шаблон</button>
          <button type="button" class="primary-btn" data-action="apply-court">Применить</button>
        </div>
      </div>

      <div class="tab-panel" data-panel="outing">
        <div class="field-grid">
          <label><span>Дата</span><input id="outingDate" type="date" /></label>
          <label><span>Время</span><input id="outingTime" type="time" /></label>
          <label><span>Номер экспертизы</span><input id="outingExpertise" type="text" placeholder="0734К-2026" /></label>
          <label><span>Эксперт</span><input id="outingExpert" type="text" placeholder="Иванов" /></label>
          <label class="full"><span>Адрес</span><input id="outingAddress" type="text" placeholder="г. Калининград, ул. Красная, д. 7, кв. 10" /></label>
          <label class="full"><span>Описание события</span><input id="outingTitle" type="text" placeholder="залитие потолка" /></label>
          <label><span>Кто едет</span><input id="outingWhoGoes" type="text" placeholder="Петров" /></label>
          <label><span>Кто вёз</span><input id="outingWhoDrove" type="text" placeholder="Lada" /></label>
          <label><span>Стоимость экспертизы</span><input id="outingExpertisePrice" type="number" placeholder="15000" /></label>
          <label><span>Стоимость выезда</span><input id="outingTripPrice" type="number" placeholder="3000" /></label>
        </div>
        <div class="form-actions">
          <button type="button" class="ghost-btn" data-action="outing-template">Шаблон</button>
          <button type="button" class="primary-btn" data-action="apply-outing">Применить</button>
        </div>
      </div>
    </section>

    <section class="draft-card">
      <div class="draft-head">
        <div>
          <div class="eyebrow">Черновик</div>
          <h2>Готовый текст для отправки</h2>
        </div>
      </div>
      <textarea id="payload" rows="8" placeholder="После нажатия «Применить» здесь появится готовый текст" readonly></textarea>
      <div id="htmlActions" class="actions">
        <button id="copyBtn" class="ghost-btn" type="button">Скопировать</button>
        <button id="sendBtn" class="primary-btn" type="button">Отправить в бота</button>
      </div>
      <div id="status" class="status" aria-live="polite"></div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
