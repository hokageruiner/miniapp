<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>BNEO Cabinet</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body data-type="court">
  <div class="app-shell">
    <header class="hero-card">
      <div class="hero-main">
        <img id="companyLogo" class="company-logo" src="assets/logo.png" alt="Лого BNEO" />
        <div>
          <div class="eyebrow">BNEO</div>
          <h1>Рабочий кабинет</h1>
          <p>Соберите суд или выезд по отдельным полям, проверьте предпросмотр и отправьте форму прямо в бота.</p>
        </div>
      </div>
      <div class="pill">Mini App</div>
    </header>

    <section class="grid">
      <button class="feature-card" type="button" data-action="court-template">
        <span class="icon">⚖️</span>
        <span class="title">Шаблон суда</span>
        <span class="desc">Подставить форму суда</span>
      </button>
      <button class="feature-card" type="button" data-action="outing-template">
        <span class="icon">🚗</span>
        <span class="title">Шаблон выезда</span>
        <span class="desc">Подставить форму выезда</span>
      </button>
      <button class="feature-card" type="button" data-action="today">
        <span class="icon">📆</span>
        <span class="title">На сегодня</span>
        <span class="desc">Сразу отправить /today</span>
      </button>
      <button class="feature-card" type="button" data-action="week">
        <span class="icon">🗓️</span>
        <span class="title">На неделю</span>
        <span class="desc">Сразу отправить /week</span>
      </button>
    </section>

    <section class="form-card">
      <form id="eventForm" novalidate>
        <div class="field-grid">
          <label>
            Тип события
            <select id="eventType" data-field>
              <option value="court">Суд</option>
              <option value="outing">Выезд</option>
            </select>
          </label>
          <label>
            Название
            <input id="title" data-field type="text" placeholder="Судебное заседание / Выезд на объект" />
          </label>
          <label>
            Дата и время
            <input id="eventDateTime" data-field type="datetime-local" />
          </label>
          <label>
            Номер дела / экспертизы
            <input id="number" data-field type="text" placeholder="A21-025/2026 или 0734К-2026" />
          </label>
          <label class="court-only">
            Суд
            <input id="courtName" data-field type="text" placeholder="Название суда" />
          </label>
          <label>
            Эксперт
            <input id="expertName" data-field type="text" placeholder="ФИО эксперта" />
          </label>
          <label class="span-2">
            Адрес
            <input id="address" data-field type="text" placeholder="г. Калининград, ..." />
          </label>
          <label class="outing-only">
            Кто едет
            <input id="whoGoes" data-field type="text" placeholder="Петров" />
          </label>
          <label class="outing-only">
            Кто вёз
            <input id="driver" data-field type="text" placeholder="Lada" />
          </label>
          <label class="outing-only">
            Стоимость экспертизы
            <input id="expertisePrice" data-field type="text" placeholder="15000" />
          </label>
          <label class="outing-only">
            Стоимость выезда
            <input id="tripPrice" data-field type="text" placeholder="3000" />
          </label>
        </div>
      </form>
    </section>

    <section class="preview-card">
      <div class="section-title">Предпросмотр</div>
      <pre id="preview" class="preview-box">Заполните поля — здесь появится аккуратный предпросмотр.</pre>
      <div id="htmlActions" class="actions">
        <button id="copyBtn" class="secondary" type="button">Скопировать</button>
        <button id="sendBtn" class="primary" type="button">Отправить в бота</button>
      </div>
      <div id="status" class="status" aria-live="polite"></div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
